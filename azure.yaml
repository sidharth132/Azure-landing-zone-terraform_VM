# Azure DevOps Pipeline: Terraform Plan & Apply with Manual Approval
# Triggers on changes to feature/* or main branches
trigger:
  branches:
    include:
      - feature/*
      - main

pr: none

variables:
  TF_WORKING_DIR: 'terraform'
  ARM_CLIENT_ID: '7a313164-9349-4ce2-9d44-e5a3e570f63c'
  ARM_TENANT_ID: 'ae5039ee-38bc-4c65-9a13-5cf76c9ae444'
  ARM_SUBSCRIPTION_ID: 'c03f6878-4621-428c-b360-d9282cbb1a98'
  # ⚠️ Add ARM_CLIENT_SECRET as a secret variable in Azure DevOps UI

stages:
# -------------------------------------------------------------
# 1️⃣ Terraform Init / Validate / Plan
# -------------------------------------------------------------
- stage: Terraform_Plan
  displayName: "Terraform Init, Validate & Plan"
  jobs:
    - job: plan
      displayName: "Terraform Plan"
      pool:
        name: Self-hosted

      steps:
        - checkout: self

        - script: |
            echo "🔐 Azure Login..."
            az login --service-principal \
              -u $(ARM_CLIENT_ID) \
              -p $(ARM_CLIENT_SECRET) \
              --tenant $(ARM_TENANT_ID)
            az account set --subscription $(ARM_SUBSCRIPTION_ID)
            echo "✅ Azure login successful!"
          displayName: "Azure Login"
          env:
            ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)

        - script: |
            cd $(TF_WORKING_DIR)
            terraform init \
              -backend-config="resource_group_name=rg_strg" \
              -backend-config="storage_account_name=strgfortfstate" \
              -backend-config="container_name=tfstate" \
              -backend-config="key=terraform-tfsate"
          displayName: "Terraform Init"

        - script: |
            cd $(TF_WORKING_DIR)
            terraform validate
          displayName: "Terraform Validate"

        - script: |
            cd $(TF_WORKING_DIR)
            terraform plan -out=tfplan
          displayName: "Terraform Plan"

        - publish: $(TF_WORKING_DIR)/tfplan
          artifact: tfplan

# -------------------------------------------------------------
# 2️⃣ Manual Approval Stage
# -------------------------------------------------------------
- stage: Approval
  displayName: "Approval Before Apply"
  dependsOn: Terraform_Plan
  jobs:
    - job: approval
      displayName: "Manual Approval"
      pool: server
      steps:
        - task: ManualValidation@0
          inputs:
            notifyUsers: |
              user1@company.com
              user2@company.com
            instructions: |
              ✅ Terraform Plan is ready for review.
              Please approve to continue with Apply.
            onTimeout: 'reject'
            timeoutInMinutes: 1440 # 24 hours

# -------------------------------------------------------------
# 3️⃣ Terraform Apply (After Approval)
# -------------------------------------------------------------
- stage: Terraform_Apply
  displayName: "Terraform Apply"
  dependsOn: Approval
  condition: succeeded('Approval')
  jobs:
    - job: apply
      displayName: "Apply Terraform Plan"
      pool:
        name: Self-hosted

      steps:
        - checkout: self

        - script: |
            echo "🔐 Azure Login..."
            az login --service-principal \
              -u $(ARM_CLIENT_ID) \
              -p $(ARM_CLIENT_SECRET) \
              --tenant $(ARM_TENANT_ID)
            az account set --subscription $(ARM_SUBSCRIPTION_ID)
            echo "✅ Azure login successful!"
          displayName: "Azure Login"
          env:
            ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)

        - download: current
          artifact: tfplan

        - script: |
            cd $(TF_WORKING_DIR)
            terraform apply -auto-approve tfplan
          displayName: "Terraform Apply"
