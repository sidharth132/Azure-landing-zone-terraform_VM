# ✅ Auto trigger when any feature/* branch is updated
trigger:
  branches:
    include:
      - feature/*

# (Optional) disable PR trigger if not needed
pr: none

variables:
  TF_WORKING_DIR: 'terraform'
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: '7a313164-9349-4ce2-9d44-e5a3e570f63c'
  ARM_TENANT_ID: 'ae5039ee-38bc-4c65-9a13-5cf76c9ae444'
  ARM_SUBSCRIPTION_ID: 'c03f6878-4621-428c-b360-d9282cbb1a98'

stages:
  # --------------------------------------
  # Stage 1: Terraform Init / Validate / Plan
  # --------------------------------------
  - stage: Terraform_Plan
    displayName: "Terraform Init, Validate & Plan"
    jobs:
      - job: plan
        displayName: "Run Terraform Plan"
        pool:
          name: Self-hosted

        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Azure Login"
            inputs:
              azureSubscription: "Azure subscription 1"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "✅ Logged into Azure successfully"

          - script: |
              cd $(TF_WORKING_DIR)
              terraform init \
                -backend-config="resource_group_name=rg_strg" \
                -backend-config="storage_account_name=strgfortfstate" \
                -backend-config="container_name=tfstate" \
                -backend-config="key=terraform-tfsate"
            displayName: "Terraform Init with Backend"

          - script: |
              cd $(TF_WORKING_DIR)
              terraform validate
            displayName: "Terraform Validate"

          - script: |
              cd $(TF_WORKING_DIR)
              terraform plan -out=tfplan
            displayName: "Terraform Plan"

          - publish: $(TF_WORKING_DIR)/tfplan
            artifact: tfplan

  # --------------------------------------
  # Stage 2: Manual Approval
  # --------------------------------------
  - stage: Approval
    displayName: "Manual Approval Before Apply"
    dependsOn: Terraform_Plan
    jobs:
      - job: approval
        displayName: "Wait for Approval"
        pool: server
        steps:
          - task: ManualValidation@0
            inputs:
              notifyUsers: |
                user1@company.com
                user2@company.com
              instructions: |
                ✅ Terraform plan is ready.
                Please review and approve to apply.
              onTimeout: 'reject'
              timeoutInMinutes: 1440  # 24 hours to approve

  # --------------------------------------
  # Stage 3: Terraform Apply
  # --------------------------------------
  - stage: Terraform_Apply
    displayName: "Terraform Apply"
    dependsOn: Approval
    condition: succeeded('Approval')
    jobs:
      - job: apply
        displayName: "Run Terraform Apply"
        pool:
          name: Self-hosted

        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Azure Login"
            inputs:
              azureSubscription: "Azure subscription 1"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "✅ Logged into Azure successfully"

          - download: current
            artifact: tfplan

          - script: |
              cd $(TF_WORKING_DIR)
              terraform apply -auto-approve tfplan
            displayName: "Terraform Apply"

